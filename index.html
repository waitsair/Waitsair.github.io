<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Карманный ИИ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #1e1e2e; display: flex; justify-content: center; align-items: center; height: 100vh; color: #cdd6f4; }
        .chat-container { width: 100%; max-width: 500px; height: 80vh; background: #313244; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .chat-header { background: #11111b; padding: 15px; text-align: center; font-size: 1.2rem; font-weight: bold; color: #a6e3a1; }
        .messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 80%; padding: 10px 14px; border-radius: 8px; line-height: 1.4; font-size: 0.95rem; word-break: break-word; }
        .user-msg { background: #89b4fa; color: #11111b; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-msg { background: #45475a; color: #cdd6f4; align-self: flex-start; border-bottom-left-radius: 2px; }
        .status-msg { background: #eba0ac; color: #11111b; align-self: center; font-size: 0.85rem; border-radius: 4px; }
        .chat-input-area { display: flex; padding: 10px; background: #181825; gap: 10px; }
        input { flex: 1; padding: 12px; border: none; border-radius: 6px; background: #313244; color: #cdd6f4; font-size: 1rem; }
        input:focus { outline: 2px solid #89b4fa; }
        button { background: #a6e3a1; color: #11111b; border: none; padding: 0 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #94e2d5; }
        button:disabled { background: #585b70; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">🤖 Локальный ИИ (Без серверов)</div>
    <div class="messages" id="chatBox">
        <div class="message ai-msg" id="initMessage">Пожалуйста, подождите. Загружаю языковую модель прямо в ваш браузер...</div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="userInput" placeholder="Напишите сообщение..." autocomplete="off" disabled>
        <button id="sendBtn" onclick="sendMessage()" disabled>Отправить</button>
    </div>
</div>

<!-- Подключаем библиотеку для запуска ИИ прямо в браузере -->
<script type="module">
    import { pipeline } from 'https://jsdelivr.net';

    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const initMessage = document.getElementById('initMessage');

    let generator = null;

    // Инициализация ИИ при загрузке страницы
    async function initAI() {
        try {
            // Загружаем самую маленькую и быструю текстовую модель (около 15 МБ), которая стабильно работает на любом ПК и телефоне
            generator = await pipeline('text2text-generation', 'Xenova/LaMini-Flan-T5-78M');
            
            initMessage.innerText = "ИИ успешно загружен в ваш браузер и готов к работе без внешних серверов! Напишите что-нибудь (лучше на английском, так как модель сверхлегкая).";
            userInput.disabled = false;
            sendBtn.disabled = false;
        } catch (e) {
            initMessage.innerText = "Не удалось загрузить локальную модель. Проверьте соединение с интернетом для первой загрузки скриптов.";
            console.error(e);
        }
    }

    // Запускаем инициализацию автоматически
    initAI();

    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') window.sendMessage();
    });

    window.sendMessage = async function() {
        const text = userInput.value.trim();
        if (!text || !generator) return;

        appendMessage(text, 'user-msg');
        userInput.value = '';
        
        userInput.disabled = true;
        sendBtn.disabled = true;

        const aiMessageDiv = appendMessage('Генерирую ответ силами вашего процессора...', 'ai-msg');

        try {
            // Генерируем текст локально без отправки fetch-запросов на сторонние сайты
            const output = await generator(text, {
                max_new_tokens: 100,
                temperature: 0.7,
                repetition_penalty: 1.2
            });

            aiMessageDiv.innerText = output[0].generated_text || "Не удалось разобрать ответ.";
        } catch (error) {
            console.error(error);
            aiMessageDiv.innerText = "Произошла локальная ошибка вычислений.";
        } finally {
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    function appendMessage(text, className) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message', className);
        messageDiv.innerText = text;
        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        return messageDiv;
    }
</script>

</body>
</html>
